<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="1200" height="700" fill="#0f172a"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="1200" height="48" fill="#1e293b"/>
  <line x1="0" y1="48" x2="1200" y2="48" stroke="#374151" stroke-width="1"/>
  <text x="16" y="30" fill="#38bdf8" font-size="18" font-weight="600">agenthud</text>
  <!-- Replay badge -->
  <rect x="120" y="14" width="52" height="20" rx="3" fill="#78350f" opacity="0.6"/>
  <text x="128" y="28" fill="#fbbf24" font-size="9" font-weight="700" letter-spacing="0.5">REPLAY</text>
  <!-- Breadcrumb -->
  <text x="182" y="30" fill="#94a3b8" font-size="11">Show me repos → Show details</text>
  <!-- Buttons -->
  <rect x="960" y="10" width="70" height="28" rx="4" fill="#374151"/>
  <text x="970" y="29" fill="#e5e7eb" font-size="12">Start over</text>
  <rect x="1040" y="10" width="60" height="28" rx="4" fill="#374151"/>
  <text x="1052" y="29" fill="#e5e7eb" font-size="12">Play All</text>
  <rect x="1110" y="10" width="60" height="28" rx="4" fill="#374151"/>
  <text x="1120" y="29" fill="#e5e7eb" font-size="12">Catalog</text>

  <!-- Left panel: A2UI Surface -->
  <rect x="0" y="48" width="830" height="652" fill="#0f172a"/>

  <!-- Panel label -->
  <text x="16" y="72" fill="#38bdf8" font-size="10" font-weight="700" letter-spacing="1">A2UI SURFACE</text>
  <text x="110" y="72" fill="#94a3b8" font-size="10">— components selected by user intent from standard catalog</text>
  <line x1="16" y1="80" x2="814" y2="80" stroke="#374151" stroke-width="1"/>

  <!-- Accumulated content: Card from overview step -->
  <rect x="16" y="92" width="798" height="80" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="32" y="116" fill="#e2e8f0" font-size="16" font-weight="600">Agents-eval</text>
  <text x="32" y="136" fill="#94a3b8" font-size="12">Multi-agent evaluation framework — PydanticAI, Streamlit GUI, 3-tier metrics</text>
  <rect x="32" y="148" width="50" height="16" rx="3" fill="#1e3a5f"/>
  <text x="40" y="160" fill="#7dd3fc" font-size="9">Python</text>
  <rect x="88" y="148" width="64" height="16" rx="3" fill="#1e3a5f"/>
  <text x="96" y="160" fill="#7dd3fc" font-size="9">PydanticAI</text>

  <!-- Accumulated: Detail view from detail step -->
  <line x1="16" y1="184" x2="814" y2="184" stroke="#374151" stroke-width="1"/>
  <rect x="16" y="196" width="60" height="60" rx="30" fill="#334155"/>
  <text x="34" y="231" fill="#94a3b8" font-size="10">avatar</text>
  <text x="90" y="220" fill="#e2e8f0" font-size="14" font-weight="600">polyforge-orchestrator</text>
  <text x="90" y="240" fill="#94a3b8" font-size="11">Parallel AI coding agent orchestration across polyrepo codebase</text>

  <!-- Decision history -->
  <text x="16" y="290" fill="#475569" font-size="10">What would you like to explore?</text>
  <text x="230" y="290" fill="#38bdf8" font-size="10" font-weight="600">Show me repos</text>
  <text x="340" y="290" fill="#475569" font-size="10">(Card, Row, Text)</text>
  <text x="16" y="306" fill="#475569" font-size="10">Want to go deeper?</text>
  <text x="145" y="306" fill="#38bdf8" font-size="10" font-weight="600">Show details</text>
  <text x="230" y="306" fill="#475569" font-size="10">(Image, Column, Divider)</text>

  <!-- Current choices -->
  <line x1="16" y1="322" x2="814" y2="322" stroke="#374151" stroke-width="1"/>
  <text x="16" y="346" fill="#94a3b8" font-size="13">Explore further?</text>

  <rect x="16" y="358" width="200" height="40" rx="6" fill="none" stroke="#374151" stroke-width="1"/>
  <text x="28" y="376" fill="#38bdf8" font-size="12" font-weight="500">List plugins</text>
  <text x="120" y="376" fill="#94a3b8" font-size="10">Column, Row</text>

  <rect x="226" y="358" width="210" height="40" rx="6" fill="none" stroke="#374151" stroke-width="1"/>
  <text x="238" y="376" fill="#38bdf8" font-size="12" font-weight="500">Set up filters</text>
  <text x="330" y="376" fill="#94a3b8" font-size="10">Card, CheckBox</text>

  <!-- Divider between panels -->
  <line x1="830" y1="48" x2="830" y2="700" stroke="#374151" stroke-width="1"/>

  <!-- Right panel: EventStream sidebar -->
  <rect x="830" y="48" width="370" height="652" fill="#111827"/>

  <!-- Panel label -->
  <text x="842" y="72" fill="#22c55e" font-size="10" font-weight="700" letter-spacing="1">AG-UI EVENTS</text>
  <text x="930" y="72" fill="#94a3b8" font-size="10">— protocol stream driving the surface</text>
  <line x1="842" y1="80" x2="1188" y2="80" stroke="#374151" stroke-width="1"/>

  <!-- Event entries -->
  <text x="842" y="100" fill="#6b7280" font-size="10" font-family="monospace">  0.00s</text>
  <rect x="898" y="88" width="82" height="16" rx="3" fill="#15803d"/>
  <text x="904" y="100" fill="#bbf7d0" font-size="9" font-family="monospace" font-weight="600">RUN_STARTED</text>

  <text x="842" y="122" fill="#6b7280" font-size="10" font-family="monospace">  0.35s</text>
  <rect x="898" y="110" width="130" height="16" rx="3" fill="#1d4ed8"/>
  <text x="904" y="122" fill="#bfdbfe" font-size="9" font-family="monospace" font-weight="600">TEXT_MESSAGE_CONTENT</text>
  <text x="842" y="136" fill="#cbd5e1" font-size="9" font-family="monospace">         Show me repos...</text>

  <text x="842" y="156" fill="#6b7280" font-size="10" font-family="monospace">  0.90s</text>
  <rect x="898" y="144" width="102" height="16" rx="3" fill="#b45309"/>
  <text x="904" y="156" fill="#fde68a" font-size="9" font-family="monospace" font-weight="600">TOOL_CALL_START</text>
  <text x="842" y="170" fill="#cbd5e1" font-size="9" font-family="monospace">         renderRepoCard(Agents-eval)</text>
  <!-- A2UI context line -->
  <text x="842" y="184" fill="#d97706" font-size="9" font-family="monospace">         processMessages → 8: Column, Card, Text, Row</text>

  <text x="842" y="204" fill="#6b7280" font-size="10" font-family="monospace">  1.10s</text>
  <rect x="898" y="192" width="92" height="16" rx="3" fill="#b45309"/>
  <text x="904" y="204" fill="#fde68a" font-size="9" font-family="monospace" font-weight="600">TOOL_CALL_END</text>

  <text x="842" y="224" fill="#6b7280" font-size="10" font-family="monospace">  1.50s</text>
  <rect x="898" y="212" width="84" height="16" rx="3" fill="#4b5563"/>
  <text x="904" y="224" fill="#d1d5db" font-size="9" font-family="monospace" font-weight="600">STEP_FINISHED</text>

  <text x="842" y="244" fill="#6b7280" font-size="10" font-family="monospace">  1.90s</text>
  <rect x="898" y="232" width="86" height="16" rx="3" fill="#4b5563"/>
  <text x="904" y="244" fill="#d1d5db" font-size="9" font-family="monospace" font-weight="600">STEP_STARTED</text>
  <text x="842" y="258" fill="#cbd5e1" font-size="9" font-family="monospace">         Rendering repo detail</text>

  <text x="842" y="278" fill="#6b7280" font-size="10" font-family="monospace">  2.30s</text>
  <rect x="898" y="266" width="102" height="16" rx="3" fill="#b45309"/>
  <text x="904" y="278" fill="#fde68a" font-size="9" font-family="monospace" font-weight="600">TOOL_CALL_START</text>
  <text x="842" y="292" fill="#cbd5e1" font-size="9" font-family="monospace">         renderRepoDetail(polyforge)</text>
  <text x="842" y="306" fill="#d97706" font-size="9" font-family="monospace">         processMessages → 8: Row, Image, Column, Text</text>

  <text x="842" y="326" fill="#6b7280" font-size="10" font-family="monospace">  2.50s</text>
  <rect x="898" y="314" width="92" height="16" rx="3" fill="#b45309"/>
  <text x="904" y="326" fill="#fde68a" font-size="9" font-family="monospace" font-weight="600">TOOL_CALL_END</text>

  <text x="842" y="346" fill="#6b7280" font-size="10" font-family="monospace">  2.70s</text>
  <rect x="898" y="334" width="82" height="16" rx="3" fill="#15803d"/>
  <text x="904" y="346" fill="#bbf7d0" font-size="9" font-family="monospace" font-weight="600">RUN_FINISHED</text>

  <!-- Labels -->
  <text x="400" y="690" fill="#475569" font-size="11" text-anchor="middle">A2UI Surface — accumulated components + decision choices</text>
  <text x="1015" y="690" fill="#475569" font-size="11" text-anchor="middle">AG-UI EventStream — different components per intent</text>
</svg>
